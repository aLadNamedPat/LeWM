encoder:
  encoder_type: vit  # 'vit' (train from scratch) or 'dino' (pre-trained DINOv2)

  # ViT parameters (used when encoder_type='vit')
  img_size: 224
  patch_size: 14
  in_channels: 3
  embed_dim: 192  # ViT-Tiny
  n_layers: 12
  n_heads: 3
  mlp_ratio: 4.0
  dropout: 0.0

  # DINOv2 parameters (used when encoder_type='dino')
  dino_model: dinov2_vits14  # vits14 (384d), vitb14 (768d), vitl14 (1024d), vitg14 (1536d)
  freeze_backbone: false  # false = fine-tune DINOv2, true = freeze (original DinoWM)

  # Common parameter
  z_dim: 192

predictor:
  z_dim: 192
  action_dim: 2  # Two Rooms: 2D continuous actions
  embed_dim: 192
  n_layers: 6
  n_heads: 16
  mlp_ratio: 4.0
  dropout: 0.1  # 10% dropout
  max_seq_len: 128

decoder:
  cls_dim: 192  # Must match encoder.z_dim
  hidden_dim: 256
  n_layers: 4
  n_heads: 8
  mlp_ratio: 4.0
  dropout: 0.0
  img_size: 224
  patch_size: 16  # Decoder uses 16x16 patches
  out_channels: 3

device: cuda
