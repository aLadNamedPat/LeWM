encoder:
  img_size: 224
  patch_size: 14
  in_channels: 3
  embed_dim: 192  # ViT-Tiny
  n_layers: 12
  n_heads: 3
  mlp_ratio: 4.0
  dropout: 0.0
  z_dim: 192

predictor:
  z_dim: 192
  action_dim: 4  # Adjust based on your environment
  embed_dim: 192
  n_layers: 6
  n_heads: 16
  mlp_ratio: 4.0
  dropout: 0.1  # 10% dropout
  max_seq_len: 128

decoder:
  cls_dim: 192  # Must match encoder.z_dim
  hidden_dim: 256
  n_layers: 4
  n_heads: 8
  mlp_ratio: 4.0
  dropout: 0.0
  img_size: 224
  patch_size: 16  # Decoder uses 16x16 patches
  out_channels: 3

device: cuda
