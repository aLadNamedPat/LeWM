encoder:
  type: dino
  dino_model_id: vit_small_patch16_dinov3.lvd1689m
  # DINOv3 ViT-S/16 was pretrained at 256; running at 224 lets us reuse the
  # existing dataset pipeline (timm interpolates the pretrained pos embeds).
  # Revisit (bump to 256 + resize in dataloader) if features look weak.
  img_size: 224
  z_dim: 384  # native CLS dim for DINOv3 ViT-S/16 — no projection head

predictor:
  z_dim: 384
  action_dim: 2  # Two Rooms: 2D continuous actions
  embed_dim: 384
  n_layers: 6
  n_heads: 16  # 384 / 16 = head_dim 24
  mlp_ratio: 4.0
  dropout: 0.1
  max_seq_len: 128

decoder:
  cls_dim: 384  # must match encoder.z_dim
  hidden_dim: 256
  n_layers: 4
  n_heads: 8
  mlp_ratio: 4.0
  dropout: 0.0
  img_size: 224
  patch_size: 16
  out_channels: 3

device: cuda
