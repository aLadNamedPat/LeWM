defaults:
  - model: default
  - loss: default
  - training: default
  - _self_

experiment_name: lwm_experiment
project_name: le-world-model
entity_name: LeWM_Experiments
checkpoint_dir: checkpoints/${experiment_name}
log_dir: logs

hydra:
  run:
    dir: outputs/${experiment_name}/${now:%Y-%m-%d_%H-%M-%S}
  sweep:
    dir: outputs/${experiment_name}
    subdir: ${hydra.job.num}
