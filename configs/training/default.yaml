batch_size: 128
learning_rate: 1e-4
num_epochs: 100
warmup_steps: 1000
gradient_clip: 1.0
seed: 42
max_episodes: null  # Set to e.g. 100 for faster dev iteration, null for full dataset
num_workers: 8  # DataLoader worker processes; 0 = load on main thread (starves GPU)
use_compile: false  # torch.compile() for speed (requires extra VRAM during compilation)
encoder_lr_mult: 0.1  # encoder params get learning_rate * this; set to 1.0 to disable